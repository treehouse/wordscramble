<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- stylesheet -->
    <link rel="stylesheet" href="./styles/css/app.css">
    <!-- icon library -->
    <!-- fontawesome library -->
    <script src="https://kit.fontawesome.com/6e358658ed.js" crossorigin="anonymous"></script>
    <title>Word Scramble</title>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="f-bold"><span>W</span>ord Scramble</h1>
            <ul class="utility-nav">
                <li><i class="fa-solid fa-star"></i></li>
                <li><i class="fa-solid fa-toggle-off"></i></li>
            </ul>
        </div>
    </header>
    <main>
        <div class="container">
            <!-- streak counter -->
            <div class="streak-counter-container"></div>

            <!-- gameboard -->
            <div class="gameboard-container">
                <div class="word-container">
                    <!-- streak counter -->
                    <div class="counter-container"></div>
                    <!-- scramble word -->
                    <div class="scrambled-word-container"></div>
                    <!-- used word list -->
                    <div class="used-word-list-container"></div>
                </div>
                <div class="keyboard-container">
                    <div class="keyboard">
                        <ul class="row">
                            <li>Q</li>
                            <li>W</li>
                            <li>E</li>
                            <li>R</li>
                            <li>T</li>
                            <li>Y</li>
                            <li>U</li>
                            <li>I</li>
                            <li>O</li>
                            <li>P</li>
                        </ul>
                        <ul class="row">
                            <li>A</li>
                            <li>S</li>
                            <li>D</li>
                            <li>F</li>
                            <li>G</li>
                            <li>H</li>
                            <li>J</li>
                            <li>K</li>
                            <li>L</li>
                        </ul>
                        <ul class="row">
                            <li>Z</li>
                            <li>X</li>
                            <li>C</li>
                            <li>V</li>
                            <li>B</li>
                            <li>N</li>
                            <li>M</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="./scripts/app.js"></script>
</body>
</html>
